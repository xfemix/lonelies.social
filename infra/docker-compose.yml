version: '3.9'
services:
  postgres:
    image: postgres:16-alpine
    container_name: lonelies_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-lonelies}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-lonelies}
      POSTGRES_DB: ${POSTGRES_DB:-lonelies}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
  redis:
    image: redis:7-alpine
    container_name: lonelies_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: ["redis-server", "--save", "", "--appendonly", "no"]
volumes:
  pgdata:
    driver: local
